name: Deploy VCRI site

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one deploy at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Put the secret URL into the site
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: |
          python3 - <<'PY'
          import os
          url = os.environ['APPS_SCRIPT_URL'].strip()
          path = 'report.html'
          with open(path, encoding='utf-8') as f:
              text = f.read()
          count = text.count('__APPS_SCRIPT_URL__')
          text = text.replace('__APPS_SCRIPT_URL__', url)
          with open(path, 'w', encoding='utf-8') as f:
              f.write(text)
          print(f'Replaced {count} placeholder(s) in {path}')
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Package the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
